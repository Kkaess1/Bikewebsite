<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parts — B-Rads Bikes</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>B-Rads Bikes</h1>
    <a class="logout-btn" id="logout-btn">Sign Out</a>
  </header>

  <div class="container">
    <div style="margin-bottom:16px;">
      <a href="/" style="font-size:0.85rem;color:#555;text-decoration:none;">&larr; Back to Dashboard</a>
    </div>

    <div id="error-msg" class="msg"></div>
    <div id="success-msg" class="msg"></div>

    <!-- Parts List -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0;border:none;padding:0;">Parts Catalog</h2>
        <button class="btn btn-primary" id="add-part-btn" type="button">+ Add Part</button>
      </div>

      <!-- Add / Edit Part Form (hidden by default) -->
      <div id="part-form" style="display:none;margin-bottom:20px;padding:16px;background:#EDF0F5;border:1px solid #C8D0DC;border-radius:6px;">
        <div style="font-weight:700;color:#002244;margin-bottom:12px;" id="form-title">Add New Part</div>
        <input type="hidden" id="edit-part-id">
        <div class="form-group">
          <label for="part-name">Part Name <span style="color:#FA4616;">*</span></label>
          <input type="text" id="part-name" placeholder="e.g. Chain Wax">
        </div>
        <div class="form-group">
          <label for="part-note">Note / Description (optional)</label>
          <textarea id="part-note" placeholder="Describe this part, usage, brand, etc." style="min-height:60px;"></textarea>
        </div>
        <div class="form-group">
          <label>Follow-Up Reminder (optional)</label>
          <p style="font-size:0.8rem;color:#6B7A8D;margin-bottom:8px;">If set, you can opt in to send an automatic reminder text to the customer after this time period when the part is used in a job.</p>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="number" id="part-followup-value" placeholder="e.g. 2" min="1" style="width:90px;">
            <select id="part-followup-unit" style="width:auto;">
              <option value="">No reminder</option>
              <option value="days">Days</option>
              <option value="weeks">Weeks</option>
              <option value="months">Months</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-primary" id="save-part-btn" type="button">Save Part</button>
          <button class="btn btn-secondary" id="cancel-part-btn" type="button">Cancel</button>
        </div>
        <div id="part-form-error" style="color:#c00;font-size:0.82rem;margin-top:6px;display:none;"></div>
      </div>

      <!-- Search -->
      <div class="form-group" style="margin-bottom:16px;">
        <input type="text" id="search-parts" placeholder="Search parts...">
      </div>

      <div id="parts-list"></div>
    </div>

    <!-- Bikes Catalog -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0;border:none;padding:0;">Bike Catalog</h2>
        <button class="btn btn-primary" id="add-bike-btn" type="button">+ Add Bike</button>
      </div>

      <!-- Add / Edit Bike Form -->
      <div id="bike-form" style="display:none;margin-bottom:20px;padding:16px;background:#EDF0F5;border:1px solid #C8D0DC;border-radius:6px;">
        <div style="font-weight:700;color:#002244;margin-bottom:12px;" id="bike-form-title">Add New Bike</div>
        <input type="hidden" id="edit-bike-id">
        <div class="form-group">
          <label for="bike-name">Bike Name / Model <span style="color:#FA4616;">*</span></label>
          <input type="text" id="bike-name" placeholder="e.g. Trek FX3">
        </div>
        <div class="form-group">
          <label for="bike-description">Description (optional)</label>
          <textarea id="bike-description" placeholder="e.g. Hybrid commuter, size M, matte black" style="min-height:60px;"></textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-primary" id="save-bike-btn" type="button">Save Bike</button>
          <button class="btn btn-secondary" id="cancel-bike-btn" type="button">Cancel</button>
        </div>
        <div id="bike-form-error" style="color:#c00;font-size:0.82rem;margin-top:6px;display:none;"></div>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <input type="text" id="search-bikes" placeholder="Search bikes...">
      </div>

      <div id="bikes-list"></div>
    </div>
  </div>

  <script src="/js/auth-guard.js"></script>
  <script src="/js/parts.js"></script>
</body>
</html>
