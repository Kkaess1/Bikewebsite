<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-Rads Bikes — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="brand">
        <h1>B-Rads Bikes</h1>
        <p>Internal Management</p>
      </div>

      <div id="error-msg" class="msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autofocus required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
